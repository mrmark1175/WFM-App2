<svg width="560" height="160" viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wm { font-family: 'Segoe UI', Arial, sans-serif; font-size: 46px; font-weight: 700; fill: #1A1F36; letter-spacing: -1px; }
      .wfm { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: white; letter-spacing: 2px; }
      .tag { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11.5px; font-weight: 500; fill: #6B7280; letter-spacing: 1.5px; }
    </style>
  </defs>

  <!-- Icon mark -->
  <g transform="translate(0, 10)">
    <rect x="0" y="0" width="78" height="78" rx="14" fill="#1A56E8"/>
    <rect x="10" y="36" width="10" height="30" rx="3" fill="white" opacity="0.3"/>
    <rect x="24" y="24" width="10" height="42" rx="3" fill="white" opacity="0.6"/>
    <rect x="38" y="14" width="10" height="52" rx="3" fill="#0ECAD4"/>
    <rect x="52" y="29" width="10" height="37" rx="3" fill="white" opacity="0.75"/>
    <circle cx="43" cy="12" r="4.5" fill="#0ECAD4"/>
    <circle cx="43" cy="12" r="2.5" fill="white"/>
  </g>

  <!-- Wordmark -->
  <text x="98" y="68" class="wm">Exordium</text>

  <!-- WFM badge -->
  <rect x="100" y="80" width="55" height="21" rx="4" fill="#1A56E8"/>
  <text x="127" y="95" text-anchor="middle" class="wfm">WFM</text>

  <!-- Divider -->
  <line x1="100" y1="114" x2="555" y2="114" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Tagline - full text, no clipping -->
  <text x="100" y="132" class="tag">WORKFORCE MANAGEMENT  ·  ENTERPRISE PLATFORM</text>
</svg>
